name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_OPENROUTER_API_KEY: ${{ secrets.VITE_OPENROUTER_API_KEY }}
          VITE_OPENROUTER_MODEL: google/gemini-2.5-flash
          VITE_OPENROUTER_FALLBACK_1: google/gemini-2.5-pro
          VITE_OPENROUTER_FALLBACK_2: openai/gpt-4o-audio-preview
          VITE_APP_URL: https://voicememok-acada.web.app
          VITE_APP_NAME: 말메 AI

      - name: Deploy to Firebase Hosting
        run: npx firebase-tools deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
