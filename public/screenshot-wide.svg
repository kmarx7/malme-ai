<svg viewBox="0 0 1280 720" xmlns="http://www.w3.org/2000/svg" width="1280" height="720">
  <!-- Background -->
  <rect width="1280" height="720" fill="#f9f9f9"/>

  <!-- Header -->
  <rect width="1280" height="80" fill="#7C3AED"/>

  <!-- Header Text -->
  <text x="640" y="50" font-size="40" font-weight="bold" fill="white" text-anchor="middle" font-family="system-ui">말메 AI</text>

  <!-- Main Content -->
  <g transform="translate(200, 150)">
    <!-- Microphone Circle -->
    <circle cx="200" cy="150" r="100" fill="#7C3AED" opacity="0.1"/>
    <circle cx="200" cy="150" r="80" fill="none" stroke="#7C3AED" stroke-width="3"/>

    <!-- Microphone Icon -->
    <path d="M 200,80 C 175,80 155,100 155,125 L 155,165 C 155,190 175,210 200,210 C 225,210 245,190 245,165 L 245,125 C 245,100 225,80 200,80 Z" fill="#7C3AED"/>
  </g>

  <!-- Status Text -->
  <text x="640" y="350" font-size="28" fill="#333" text-anchor="middle" font-family="system-ui">음성 메모를 시작하세요</text>
  <text x="640" y="400" font-size="18" fill="#666" text-anchor="middle" font-family="system-ui">AI가 자동으로 분석하고 정리해드립니다</text>

  <!-- Button -->
  <rect x="520" y="450" width="240" height="60" rx="30" fill="#7C3AED"/>
  <text x="640" y="490" font-size="20" font-weight="bold" fill="white" text-anchor="middle" font-family="system-ui">메모 시작</text>
</svg>
